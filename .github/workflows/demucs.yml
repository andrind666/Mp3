name: Demucs 6 Stem Separation

on:
  workflow_dispatch:

jobs:
  separate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install demucs
          pip install torchcodec

      - name: Check Input
        run: |
          ls -lah input

      - name: Separate Audio (6 Stem)
        run: |
          demucs \
            --name htdemucs_6s \
            --float32 \
            --segment 8 \
            --overlap 0.5 \
            --out separated \
            input/song.mp3

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: demucs-output
          path: separated/

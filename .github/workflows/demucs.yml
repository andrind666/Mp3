name: Demucs Audio Separation

on:
workflow_dispatch:

jobs:
separate:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install FFmpeg
    run: |
      sudo apt-get update
      sudo apt-get install -y ffmpeg

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install torch==2.1.2
      pip install torchaudio==2.1.2
      pip install demucs==4.0.1
      pip install torchcodec

  - name: Check Input File
    run: |
      echo "Checking input directory..."
      ls -lah input
      if [ ! -f input/song.mp3 ]; then
        echo "ERROR: input/song.mp3 not found!"
        exit 1
      fi

  - name: Run Demucs
    run: |
      python -m demucs.separate \
        --two-stems vocals \
        --mp3 \
        input/song.mp3

  - name: Show Output
    run: |
      find separated -type f

  - name: Upload Results
    uses: actions/upload-artifact@v4
    with:
      name: demucs-output
      path: separated/
